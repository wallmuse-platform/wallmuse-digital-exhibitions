      responses:
        "200": { description: Count }

  /search_montages_full:
    get:
      tags: [Montage]
      summary: Search montages (paginated, full data)
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: desc, in: query, schema: { type: string } }
        - { name: categories, in: query, schema: { type: string } }
        - { name: commercial, in: query, schema: { type: integer } }
        - { name: splittable, in: query, schema: { type: integer } }
        - { name: deconstructable, in: query, schema: { type: integer } }
        - { name: portrait, in: query, schema: { type: integer } }
        - { name: uhd, in: query, schema: { type: integer } }
        - { name: page, in: query, required: true, schema: { type: integer } }
        - { name: page_size, in: query, required: true, schema: { type: integer } }
        - { name: sort, in: query, required: true, schema: { type: string } }
        - { name: display, in: query, schema: { type: integer, default: 0 } }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Montage list (XML) }

  /set_montage_full:
    post:
      tags: [Montage]
      summary: Save full montage metadata (XML payload)
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: montage, in: query, required: true, schema: { type: string }, description: "XML-encoded montage descriptor" }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Montage saved }

  /get_montages:
    get:
      tags: [Montage]
      summary: List montages (lightweight)
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Montage list }

  /send_stats:
    post:
      tags: [Montage]
      summary: Submit playback statistics
      parameters:
        - { name: stats, in: query, required: true, schema: { type: string } }
        - { name: house, in: query, required: true, schema: { type: integer } }
        - { name: key, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: Stats recorded }

  # ── Playlist ─────────────────────────────────────────────────────────────────

  /get_playlists:
    get:
      tags: [Playlist]
      summary: List playlists for a user
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Playlist list (XML) }

  /add_playlist:
    post:
      tags: [Playlist]
      summary: Create a playlist
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: name, in: query, required: true, schema: { type: string } }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Playlist ID }

  /upd_playlist:
    post:
      tags: [Playlist]
      summary: Update playlist name, order, or montage list
      description: |
        Pass `montages` as a comma-separated list of montage IDs to set the playlist
        content in one call. Pass `random=1` to enable shuffle mode.
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: playlist, in: query, schema: { type: integer } }
        - { name: name, in: query, schema: { type: string } }
        - { name: random, in: query, schema: { type: integer } }
        - { name: montages, in: query, schema: { type: string }, description: "Comma-separated montage IDs" }
        - { name: checks, in: query, schema: { type: string } }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Playlist updated }

  /del_playlist:
    post:
      tags: [Playlist]
      summary: Delete a playlist
      parameters:
        - { name: user, in: query, schema: { type: integer } }
        - { name: playlist, in: query, required: true, schema: { type: integer } }
        - { name: key, in: query, schema: { type: string } }
        - { name: session, in: query, schema: { type: string } }
      responses:
        "200": { description: Playlist deleted }

  # ── Media ────────────────────────────────────────────────────────────────────

  /convert:
    post:
      tags: [Media]
      summary: Transcode a video file via FFmpeg
      parameters:
        - { name: src, in: query, required: true, schema: { type: string } }
        - { name: dst, in: query, required: true, schema: { type: string } }
        - { name: hd, in: query, schema: { type: integer, default: 0 } }
        - { name: mute, in: query, schema: { type: integer, default: 0 } }
        - { name: start, in: query, schema: { type: integer } }
        - { name: end, in: query, schema: { type: integer } }
      responses:
        "200": { description: Conversion started or completed }

  /generate_thumbnail:
    post:
      tags: [Media]
      summary: Generate a thumbnail image from a video
      parameters:
        - { name: src, in: query, required: true, schema: { type: string } }
        - { name: dst, in: query, required: true, schema: { type: string } }
        - { name: size, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Thumbnail generated }

  /s3_add_file:
    post:
      tags: [Media]
      summary: Upload a file to S3
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
        - { name: name, in: query, schema: { type: string } }
        - { name: delete, in: query, schema: { type: integer, default: 0 } }
        - { name: root, in: query, schema: { type: string } }
        - { name: recursive, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200": { description: File(s) uploaded }

  /s3_upd_file:
    post:
      tags: [Media]
      summary: Update (overwrite) a file on S3
      parameters:
        - { name: path, in: query, required: true, schema: { type: string } }
        - { name: name, in: query, schema: { type: string } }
        - { name: delete, in: query, schema: { type: integer, default: 0 } }
        - { name: root, in: query, schema: { type: string } }
      responses:
        "200": { description: File updated }

  /s3_del_file:
    post:
      tags: [Media]
      summary: Delete a file from S3
      parameters:
        - { name: path, in: query, schema: { type: string } }
        - { name: name, in: query, schema: { type: string } }
        - { name: root, in: query, schema: { type: string } }
        - { name: recursive, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200": { description: File(s) deleted }

  /s3_get_file:
    get:
      tags: [Media]
      summary: Download a file from S3
      parameters:
        - { name: name, in: query, required: true, schema: { type: string } }
      responses:
        "200":
          description: File binary
          content:
            application/octet-stream:
              schema: { type: string, format: binary }

  /s3_list_files:
    get:
      tags: [Media]
      summary: List files in an S3 path
      parameters:
        - { name: path, in: query, schema: { type: string } }
        - { name: name, in: query, schema: { type: string } }
        - { name: root, in: query, schema: { type: string } }
      responses:
        "200": { description: File list }

  /s3_garbage_collect:
    post:
      tags: [Media]
      summary: Remove S3 files no longer referenced by the database
      parameters:
        - { name: test, in: query, schema: { type: integer, default: 1 }, description: "1 = dry run, 0 = real delete" }
      responses:
        "200": { description: GC report }

  # ── Back-office ──────────────────────────────────────────────────────────────

  /bo_compute_counts:
    post:
      tags: [BackOffice]
      summary: Recompute aggregated counters
      responses:
        "200": { description: Counts updated }

  /bo_create_stats:
    post:
      tags: [BackOffice]
      summary: Generate a statistics report
      parameters:
        - { name: user, in: query, required: true, schema: { type: integer } }
        - { name: montage, in: query, required: true, schema: { type: integer } }
        - { name: tracks, in: query, required: true, schema: { type: string } }
        - { name: width, in: query, required: true, schema: { type: integer } }
        - { name: from, in: query, required: true, schema: { type: string } }
        - { name: to, in: query, required: true, schema: { type: string } }
        - { name: percentage, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Stats report }
